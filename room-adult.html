<!DOCTYPE html>
<html>
<head>
    <title>Imperial Kingdom Hub: Character Atelier</title>
    <style>
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; 
            min-height: 100vh; 
            color: #ffffff;
            background-color: #0b1d3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        .main-container {
            width: 90%;
            max-width: 1200px;
            background: rgba(11, 29, 58, 0.95);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-banner {
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            color: #0b1d3a;
            text-align: center;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .atelier-grid {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .portrait-section {
            flex: 1;
            min-width: 320px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            padding: 20px;
            border-radius: 10px;
        }

        /* Royal Breathing / Floating Animation for Queen Rosana */
        @keyframes royalFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .royal-portrait-img {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            border: 2px solid #d4af37;
            animation: royalFloat 4s ease-in-out infinite;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .controls-section {
            flex: 1;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            padding: 25px;
            border-radius: 10px;
        }

        .controls-section h3 {
            color: #ffd700;
            margin-top: 0;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: #102a52;
            border: 1px solid #d4af37;
            color: #ffffff;
            border-radius: 5px;
            font-family: 'Georgia', serif;
        }

        .sections-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .section-box {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #d4af37;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .section-box h3 {
            color: #ffd700;
            margin-top: 0;
        }

        .royal-button {
            background-color: #ffd700;
            color: #0b1d3a;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: background 0.3s;
        }

        .royal-button:hover {
            background-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .royal-branding { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 100px; 
            z-index: 1000; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-banner">
            QUEEN ROSANA
        </div>

        <div class="atelier-grid">
            <!-- Queen Rosana's Living Portrait -->
            <div class="portrait-section">
                <img src="watermarked_img_13694216075338772645.png" class="royal-portrait-img" alt="Queen Rosana Portrait">
            </div>

            <!-- The Royal Atelier Controls -->
            <div class="controls-section">
                <h3>The Royal Atelier</h3>
                
                <div class="form-group">
                    <label>Hair Style:</label>
                    <select class="form-control">
                        <option>Regal Braid</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Royal Gown Theme:</label>
                    <select class="form-control">
                        <option>Imperial Blue & Gold Velvet</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Character Name:</label>
                    <input type="text" class="form-control" value="Queen Rosana" readonly>
                </div>

                <div class="form-group">
                    <label>Imperial Titles:</label>
                    <input type="text" class="form-control" value="Administrator, Sovereign, and Prophet" readonly>
                </div>
            </div>
        </div>

        <!-- Lower Marketplace & Boutique Sections -->
        <div class="sections-container">
            <div class="section-box">
                <h3>Marketplace & Hospital</h3>
                <p>Current Royal Tax: 15% (5% for Divine Masters)</p>
                <button class="royal-button" onclick="alert('Entering Hospital');">Visit</button>
            </div>

            <div class="section-box">
                <h3>Royal Boutique</h3>
                <p>Imperial Gown of the Sun (Exclusive Attire)</p>
                <button class="royal-button" onclick="alert('Acquiring Exclusive Attire');">Acquire Exclusive Attire</button>
            </div>
        </div>
    </div>

    <img src="official-seal.png" class="royal-branding" alt="Imperial Divine Vision Seal">

</body>
</html>
