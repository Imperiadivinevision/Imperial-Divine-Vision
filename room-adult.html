<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Sovereign Chamber</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.95);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
            --accent-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        .chamber-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18,16,14,0.5), var(--bg-dark)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .control-sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 5px 0 25px rgba(0,0,0,0.8);
        }

        .control-sidebar.right {
            border-right: none;
            border-left: 2px solid var(--gold);
            box-shadow: -5px 0 25px rgba(0,0,0,0.8);
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 1.05rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 6px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 8px;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .wardrobe-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom scrollbar for wardrobe */
        .wardrobe-grid::-webkit-scrollbar {
            width: 6px;
        }
        .wardrobe-grid::-webkit-scrollbar-track {
            background: #181410;
        }
        .wardrobe-grid::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .wardrobe-item {
            background: #181410;
            border: 1px solid var(--gold);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: left;
            color: var(--text-main);
        }

        .wardrobe-item:hover, .wardrobe-item.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            transform: translateX(3px);
        }

        .skin-palette {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .skin-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .skin-swatch:hover, .skin-swatch.selected {
            transform: scale(1.15);
            box-shadow: 0 0 10px var(--gold);
        }

        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 5;
            padding: 20px;
        }

        .stage-banner {
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            padding: 12px 25px;
            border-radius: 6px;
            margin-bottom: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 520px;
            width: 100%;
            box-sizing: border-box;
        }

        .stage-banner h1 {
            color: var(--gold);
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .audio-player-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-btn {
            background: #181410;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 6px 14px;
            font-family: 'Georgia', serif;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .audio-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            box-shadow: 0 0 12px var(--gold);
        }

        .character-stage-display {
            position: relative;
            max-width: 520px;
            width: 100%;
            height: 480px;
            background: rgba(11, 9, 7, 0.95);
            border: 3px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.95), 0 0 25px rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .character-preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0b0907;
        }

        .stage-footer {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 520px;
        }

        .back-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 12px 25px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .back-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 20px var(--gold);
        }
    </style>
</head>
<body>

    <div class="chamber-background"></div>

    <audio id="royal-audio" loop>
        <source src="https://actions.google.com/sounds/v1/ambiences/forest_birds.ogg" type="audio/ogg">
    </audio>

    <div class="container">
        
        <!-- Left Sidebar: Sovereign Focus & Appearance -->
        <div class="control-sidebar">
            <div class="panel-section-title">Sovereign Focus</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="switchSovereign('queen', this)">Queen Rosana</button>
                <button class="option-btn" onclick="switchSovereign('king', this)">King Benson</button>
            </div>

            <div class="panel-section-title" style="margin-top: 10px;">Skin Tone</div>
            <div class="skin-palette">
                <div class="skin-swatch selected" style="background-color: #5c3824;" onclick="setSkinTone('Deep Warm', this)" title="Deep Warm"></div>
                <div class="skin-swatch" style="background-color: #8d5524;" onclick="setSkinTone('Rich Brown', this)" title="Rich Brown"></div>
                <div class="skin-swatch" style="background-color: #c68642;" onclick="setSkinTone('Golden Tan', this)" title="Golden Tan"></div>
                <div class="skin-swatch" style="background-color: #e0ac69;" onclick="setSkinTone('Olive', this)" title="Olive"></div>
                <div class="skin-swatch" style="background-color: #f5d0b1;" onclick="setSkinTone('Fair', this)" title="Fair"></div>
            </div>

            <div class="panel-section-title" style="margin-top: 10px;">Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setHair('Braid-Updo', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setHair('Extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setHair('Natural Curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setHair('Royal Waves', this)">Royal Waves</button>
            </div>
        </div>

        <!-- Center Stage Viewport with Living Cinematic Video Player -->
        <div class="character-viewport">
            <div class="stage-banner">
                <h1>Throne Chamber</h1>
                <div class="audio-player-box">
                    <button class="audio-btn" onclick="toggleAudio()" id="audio-toggle-btn">🎵 Play Sound</button>
                </div>
            </div>
            
            <div class="character-stage-display">
                <video id="preview-video" class="character-preview-video" autoplay loop muted playsinline>
                    <source src="rosanna-3-CINEMATIC.mp4" type="video/mp4">
                    Your browser does not support video.
                </video>
            </div>

            <div class="stage-footer">
                <p id="character-summary-text" style="font-size: 0.95rem; color: var(--gold); margin: 0; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
                    Queen Rosana | Deep Warm | Braid-Updo | Rosana Cinematic 3
                </p>
                <a href="gateway.html" class="back-btn">Return to Gateway</a>
            </div>
        </div>

        <!-- Right Sidebar: Dedicated Wardrobe -->
        <div class="control-sidebar right">
            <div class="panel-section-title" id="wardrobe-title">Queen's Wardrobe</div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 8px 0;" id="wardrobe-subtitle">Select cinematic attire:</p>
            
            <div class="wardrobe-grid" id="wardrobe-list"></div>

            <div class="panel-section-title" style="margin-top: 10px;">Accessory Type</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setAccessory('Imperial Crown', this)">Crown</button>
                <button class="option-btn" onclick="setAccessory('Gold Circlet', this)">Circlet</button>
                <button class="option-btn" onclick="setAccessory('Ceremonial Veil', this)">Veil</button>
                <button class="option-btn" onclick="setAccessory('Vellet Band', this)">Vellet</button>
            </div>
        </div>

    </div>

    <script>
        // Queen Rosana's complete cinematic wardrobe
        const queenWardrobe = [
            { name: 'Rosana Cinematic 3', file: 'rosanna-3-CINEMATIC.mp4' },
            { name: 'Rosana Cinematic 1', file: 'rosanna-1-CINEMATIC.mp4' },
            { name: 'Imperial White', file: 'rosanna-imperial-white-CINEMATIC.mp4' },
            { name: 'Imperial Read', file: 'rosanna-imperial-read-CINEMATIC.mp4' },
            { name: 'Blue Red Royal', file: 'rosanna-blue-red-CINEMATIC.mp4' },
            { name: 'Relax Green', file: 'rosanna-relax-green-CINEMATIC.mp4' },
            { name: 'Pink Glamour', file: 'rosanna-pink-3-CINEMATIC.mp4' },
            { name: 'Pink Cinematic', file: 'rosanna-pink-CINEMATIC.mp4' },
            { name: 'Pink Cinematic 1', file: 'rosanna-pink-CINEMATIC-1.mp4' },
            { name: 'Green Cinematic', file: 'rosanna-green-CINEMATIC.mp4' },
            { name: 'Best Sovereign', file: 'rosanna-best-CINEMATIC.mp4' },
            { name: 'Throne Presence', file: 'queen-throne-CINEMATIC-1.mp4' }
        ];

        // King Benson's complete cinematic wardrobe
        const kingWardrobe = [
            { name: 'King White Armor', file: 'king-benson-white-CINEMATIC.mp4' },
            { name: 'King Imperial Armor', file: 'king-benson-imperial-CINEMATIC.mp4' },
            { name: 'Throne & Armor Duo', file: 'king-queen-throne-armor-CINEMAT.mp4' },
            { name: 'Royal Purple Duo', file: 'king-queen-royal-purple-CINEMATIC-5.mp4' },
            { name: 'White Sovereign Duo', file: 'king-queen-white-CINEMATIC-4.mp4' },
            { name: 'Purple Harmony Duo', file: 'king-queen-purple-CINEMATIC-2.mp4' },
            { name: 'Pink Court Duo', file: 'king-queen-pink-CINEMATIC-1.mp4' },
            { name: 'Moving Carriage', file: 'king-queen-moving-carriage-cINEMATIC.mp4' },
            { name: 'Imperial Bedroom', file: 'imperial-bedroom-CINEMATIC.mp4' }
        ];

        let currentRole = 'queen';
        let characterConfig = {
            skinTone: 'Deep Warm',
            hair: 'Braid-Updo',
            outfitName: 'Rosana Cinematic 3',
            outfitVideo: 'rosanna-3-CINEMATIC.mp4'
        };

        function populateWardrobe() {
            const container = document.getElementById('wardrobe-list');
            const titleElem = document.getElementById('wardrobe-title');
            if (!container) return;
            container.innerHTML = '';
            
            let list = currentRole === 'queen' ? queenWardrobe : kingWardrobe;
            titleElem.innerText = currentRole === 'queen' ? "Queen's Wardrobe" : "King's Wardrobe";

            list.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `wardrobe-item ${index === 0 ? 'selected' : ''}`;
                div.onclick = () => setOutfit(item.name, item.file, div);
                div.innerHTML = `<span>👑 ${item.name}</span>`;
                container.appendChild(div);
            });
        }

        window.onload = populateWardrobe;

        let isPlaying = false;
        function toggleAudio() {
            const audio = document.getElementById('royal-audio');
            const btn = document.getElementById('audio-toggle-btn');
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                btn.innerText = "🎵 Play Sound";
                isPlaying = false;
            } else {
                audio.volume = 0.5;
                audio.play().then(() => {
                    btn.innerText = "🔇 Pause Sound";
                    isPlaying = true;
                }).catch(e => console.log("Audio play blocked"));
            }
        }

        function switchSovereign(role, btn) {
            updateButtonGroup(btn);
            currentRole = role;
            populateWardrobe();

            let list = role === 'queen' ? queenWardrobe : kingWardrobe;
            if(list.length > 0) {
                setOutfit(list[0].name, list[0].file, document.querySelector('.wardrobe-item'));
            }
        }

        function setSkinTone(val, swatch) {
            document.querySelectorAll('.skin-swatch').forEach(s => s.classList.remove('selected'));
            swatch.classList.add('selected');
            characterConfig.skinTone = val;
            updateSummary();
        }

        function setHair(val, btn) {
            updateButtonGroup(btn);
            characterConfig.hair = val;
            updateSummary();
        }

        function setOutfit(name, videoFile, itemElement) {
            document.querySelectorAll('.wardrobe-item').forEach(i => i.classList.remove('selected'));
            if(itemElement) itemElement.classList.add('selected');
            
            characterConfig.outfitName = name;
            characterConfig.outfitVideo = videoFile;
            
            const videoElem = document.getElementById('preview-video');
            videoElem.src = videoFile;
            videoElem.load();
            videoElem.play().catch(e => console.log("Autoplay waiting for interaction"));
            
            updateSummary();
        }

        function setAccessory(val, btn) {
            updateButtonGroup(btn);
        }

        function updateButtonGroup(clickedBtn) {
            clickedBtn.parentElement.querySelectorAll('.option-btn, .skin-swatch').forEach(b => b.classList.remove('selected'));
            clickedBtn.classList.add('selected');
        }

        function updateSummary() {
            let nameStr = currentRole === 'queen' ? 'Queen Rosana' : 'King Benson';
            document.getElementById('character-summary-text').innerText = 
                `${nameStr} | ${characterConfig.skinTone} | ${characterConfig.hair} | ${characterConfig.outfitName}`;
        }
    </script>
</body>
</html>
