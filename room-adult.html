<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Sovereign Chamber</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.98);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
            --accent-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
            height: 100vh;
            width: 100%;
            position: relative;
            box-sizing: border-box;
            padding: 10px;
            gap: 10px;
        }

        .chamber-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18,16,14,0.5), var(--bg-dark)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .control-sidebar {
            width: 280px;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            max-height: calc(100vh - 20px);
            box-sizing: border-box;
        }

        .control-sidebar::-webkit-scrollbar {
            width: 5px;
        }
        .control-sidebar::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 3px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 5px;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .likeness-studio-box {
            background: rgba(14, 25, 20, 0.95);
            border: 1px solid var(--gold);
            border-radius: 6px;
            padding: 8px;
            text-align: left;
        }

        .likeness-studio-box h4 {
            color: var(--gold);
            margin: 0 0 3px 0;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .likeness-studio-box p {
            color: var(--text-muted);
            font-size: 0.7rem;
            line-height: 1.2;
            margin: 0 0 6px 0;
            font-style: italic;
        }

        .likeness-input {
            width: 100%;
            background: #12100e;
            border: 1px solid var(--gold);
            color: var(--text-main);
            padding: 5px;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            border-radius: 3px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }

        .wardrobe-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .wardrobe-grid::-webkit-scrollbar {
            width: 5px;
        }
        .wardrobe-grid::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .wardrobe-item {
            background: #181410;
            border: 1px solid var(--gold);
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: left;
            color: var(--text-main);
            font-size: 0.8rem;
        }

        .wardrobe-item:hover, .wardrobe-item.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .skin-palette {
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }

        .skin-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .skin-swatch:hover, .skin-swatch.selected {
            transform: scale(1.15);
            box-shadow: 0 0 8px var(--gold);
        }

        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 5;
            padding: 5px;
        }

        .stage-banner {
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            padding: 8px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 440px;
            width: 100%;
            box-sizing: border-box;
        }

        .stage-banner h1 {
            color: var(--gold);
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 1px;
        }

        .audio-btn {
            background: #181410;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 4px 8px;
            font-family: 'Georgia', serif;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .audio-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .character-stage-display {
            position: relative;
            max-width: 440px;
            width: 100%;
            height: 440px;
            background: rgba(11, 9, 7, 0.98);
            border: 3px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .character-preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0b0907;
        }

        .stage-footer {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 440px;
        }

        .back-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 8px 15px;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 15px var(--gold);
        }
    </style>
</head>
<body>

    <div class="chamber-background"></div>

    <audio id="royal-audio" loop>
        <source src="rosanna-music-galary.m4a" type="audio/mp4">
    </audio>

    <div class="container">
        
        <!-- Left Sidebar -->
        <div class="control-sidebar">
            <div class="panel-section-title">Sovereign Focus</div>
            <div class="option-grid">
                <button class="option-btn selected" id="btn-queen" onclick="switchSovereign('queen', this)">Queen Rosana</button>
                <button class="option-btn" id="btn-king" onclick="switchSovereign('king', this)">King Benson</button>
            </div>

            <div class="panel-section-title">Skin Tone</div>
            <div class="skin-palette">
                <div class="skin-swatch selected" style="background-color: #5c3824;" onclick="setSkinTone('Deep Warm', this)" title="Deep Warm"></div>
                <div class="skin-swatch" style="background-color: #8d5524;" onclick="setSkinTone('Rich Brown', this)" title="Rich Brown"></div>
                <div class="skin-swatch" style="background-color: #c68642;" onclick="setSkinTone('Golden Tan', this)" title="Golden Tan"></div>
                <div class="skin-swatch" style="background-color: #e0ac69;" onclick="setSkinTone('Olive', this)" title="Olive"></div>
                <div class="skin-swatch" style="background-color: #f5d0b1;" onclick="setSkinTone('Fair', this)" title="Fair"></div>
            </div>

            <div class="panel-section-title">Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setHair('Braid-Updo', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setHair('Extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setHair('Natural Curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setHair('Royal Waves', this)">Royal Waves</button>
            </div>

            <!-- Updated Likeness Studio Box linking to likeness-chamber.html -->
            <div class="likeness-studio-box">
                <h4>✨ Create Your Likeness</h4>
                <p>Design a member character in your own image for the realm.</p>
                <input type="text" id="custom-name-input" class="likeness-input" placeholder="Enter Character Name...">
                <button class="option-btn" style="width: 100%;" onclick="goToLikenessChamber()">Save & Enter Chamber</button>
            </div>
        </div>

        <!-- Center Stage Viewport -->
        <div class="character-viewport">
            <div class="stage-banner">
                <h1>Adult Chamber Wardrobe</h1>
                <button class="audio-btn" onclick="toggleAudio()" id="audio-toggle-btn">🎵 Play Rosanna Gallery</button>
            </div>
            
            <div class="character-stage-display">
                <video id="preview-video" class="character-preview-video" autoplay loop muted playsinline>
                    <source src="rosanna-imperial-white-CINEMATIC.mp4" type="video/mp4">
                    Your browser does not support video.
                </video>
            </div>

            <div class="stage-footer">
                <p id="character-summary-text" style="font-size: 0.8rem; color: var(--gold); margin: 0; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
                    Queen Rosana | Deep Warm | Braid-Updo | Imperial White Cinematic
                </p>
                <a href="index.html" class="back-btn">Return to Sanctuary Home</a>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="control-sidebar right">
            <div class="panel-section-title" id="wardrobe-title">Queen's Wardrobe</div>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin: 0 0 4px 0;">Select cinematic attire:</p>
            
            <div class="wardrobe-grid" id="wardrobe-list"></div>

            <div class="panel-section-title" style="margin-top: 8px;">Accessory Type</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setAccessory('Imperial Crown', this)">Crown</button>
                <button class="option-btn" onclick="setAccessory('Gold Circlet', this)">Circlet</button>
                <button class="option-btn" onclick="setAccessory('Ceremonial Veil', this)">Veil</button>
                <button class="option-btn" onclick="setAccessory('Velvet Band', this)">Velvet</button>
            </div>
        </div>

    </div>

    <script>
        const queenWardrobe = [
            { name: 'Imperial White Cinematic', file: 'rosanna-imperial-white-CINEMATIC.mp4' },
            { name: 'Pink 3 Cinematic', file: 'rosanna-pink-3-CINEMATIC.mp4' },
            { name: 'Pink Cinematic 1', file: 'rosanna-pink-CINEMATIC-1.mp4' },
            { name: 'Pink Cinematic', file: 'rosanna-pink-CINEMATIC.mp4' },
            { name: 'Purple Cinematic', file: 'rosanna-purple-CINEMATIC.mp4' },
            { name: 'Relax Green Cinematic', file: 'rosanna-relax-green-CINEMATIC.mp4' },
            { name: 'White 2 Cinematic', file: 'rosanna-white-2-CINEMATIC.mp4' },
            { name: 'White Cinematic', file: 'rosanna-white-CINEMATIC.mp4' },
            { name: 'Imperial Outfit Cinematic', file: 'rosanna-imperial-outfit-CINEMATIC.mp4' },
            { name: 'Imperial Read Cinematic', file: 'rosanna-imperial-read-CINEMATIC.mp4' },
            { name: 'Rosana Cinematic 1', file: 'rosanna-1-CINEMATIC.mp4' },
            { name: 'Rosana Cinematic 3', file: 'rosanna-3-CINEMATIC.mp4' },
            { name: 'Best Sovereign Cinematic', file: 'rosanna-best-CINEMATIC.mp4' },
            { name: 'Blue Red Cinematic', file: 'rosanna-blue-red-CINEMATIC.mp4' },
            { name: 'Green Cinematic', file: 'rosanna-green-CINEMATIC.mp4' },
            { name: 'Throne Presence Cinematic', file: 'queen-throne-CINEMATIC-1.mp4' },
            { name: 'Outfit 6', file: 'rosanna-outfit-6.png' },
            { name: 'Outfit 7', file: 'rosanna-outfit-7.png' },
            { name: 'Outfit 8', file: 'rosanna-outfit-8.png' },
            { name: 'Outfit 10', file: 'rosanna-outfit-10.png' },
            { name: 'Outfit 11', file: 'rosanna-outfit-11.png' },
            { name: 'Outfit 12', file: 'rosanna-outfit-12.png' },
            { name: 'Outfit 13', file: 'rosanna-outfit-13.png' },
            { name: 'Outfit 14', file: 'rosanna-outfit-14.png' },
            { name: 'Outfit 17', file: 'rosanna-outfit-17.png' },
            { name: 'Outfit 18', file: 'rosanna-outfit-18.png' },
            { name: 'Outfit 21', file: 'rosanna-outfit-21.png' },
            { name: 'Outfit 50', file: 'rosanna-outfit-50.png' },
            { name: 'Outfit 51', file: 'rosanna-outfit-51.png' },
            { name: 'Outfit 52', file: 'rosanna-outfit-52.png' },
            { name: 'Outfit 55', file: 'rosanna-outfit-55.png' },
            { name: 'Outfit 56', file: 'rosanna-outfit-56.png' },
            { name: 'Outfit 57', file: 'rosanna-outfit-57.png' },
            { name: 'Outfit 58', file: 'rosanna-outfit-58.png' },
            { name: 'Outfit 59', file: 'rosanna-outfit-59.png' },
            { name: 'Outfit 60', file: 'rosanna-outfit-60.png' },
            { name: 'Outfit 61', file: 'rosanna-outfit-61.png' },
            { name: 'Outfit 63', file: 'rosanna-outfit-63.png' },
            { name: 'Outfit 65', file: 'rosanna-outfit-65.png' },
            { name: 'Outfit 69', file: 'rosanna-outfit-69.png' },
            { name: 'Outfit 70', file: 'rosanna-outfit-70.png' },
            { name: 'Outfit 71', file: 'rosanna-outfit-71.png' },
            { name: 'Outfit 72', file: 'rosanna-outfit-72.png' },
            { name: 'Outfit 78', file: 'rosanna-outfit-78.png' },
            { name: 'Outfit 80', file: 'rosanna-outfit-80.png' },
            { name: 'Outfit 90', file: 'rosanna-outfit-90.png' },
            { name: 'Outfit 97', file: 'rosanna-outfit-97.png' },
            { name: 'Dress', file: 'dress.png' },
            { name: 'Robe 1', file: 'Robe-1.png' },
            { name: 'Robe 2', file: 'Robe-2.png' },
            { name: 'Robe 3', file: 'Robe-3.png' },
            { name: 'Robe 4', file: 'Robe-4.png' },
            { name: 'Rosanna VIP', file: 'rosanna_vip.png' },
            { name: 'Rosanna Tea', file: 'rosanna-tea-1.png' }
        ];

        const kingWardrobe = [
            { name: 'King Imperial Cinematic', file: 'king-benson-imperial-CINEMATIC.mp4' },
            { name: 'King White Cinematic', file: 'king-benson-white-CINEMATIC.mp4' },
            { name: 'Pink Cinematic Duo', file: 'king-queen-pink-CINEMATIC-1.mp4' },
            { name: 'Purple Cinematic Duo', file: 'king-queen-purple-CINEMATIC-2.mp4' },
            { name: 'Royal Purple Duo', file: 'king-queen-royal-purple-CINEMATIC-5.mp4' },
            { name: 'Throne Armor Duo', file: 'king-queen-throne-armor-CINEMATIC.mp4' },
            { name: 'White Cinematic Duo', file: 'king-queen-white-CINEMATIC-4.mp4' },
            { name: 'King Outfit 1', file: 'king-benson-outfit-1.png' },
            { name: 'King Outfit 2', file: 'king-benson-outfit-2.png' },
            { name: 'King Outfit 6', file: 'king-benson-outfit-6.png' },
            { name: 'King Outfit 7', file: 'king-benson-outfit-7.png' },
            { name: 'King Outfit 9', file: 'king-benson-outfit-9.png' },
            { name: 'King Outfit 10', file: 'king-benson-outfit-10.png' },
            { name: 'King Outfit 12', file: 'king-benson-outfit-12.png' },
            { name: 'King Outfit 15', file: 'king-benson-outfit-15.png' },
            { name: 'Benson Outfit Main', file: 'benson-outfit.png' },
            { name: 'King Benson 11', file: 'king-benson-11.png' },
            { name: 'Hunting Clothes', file: 'king-benson-hunting-clothes-meduim.png' },
            { name: 'On Horse', file: 'king-benson-on-horse.png' }
        ];

        let currentRole = 'queen';
        let characterConfig = {
            skinTone: 'Deep Warm',
            hair: 'Braid-Updo',
            accessory: 'Imperial Crown',
            outfitName: 'Imperial White Cinematic',
            outfitVideo: 'rosanna-imperial-white-CINEMATIC.mp4',
            customName: ''
        };

        function populateWardrobe() {
            const container = document.getElementById('wardrobe-list');
            const titleElem = document.getElementById('wardrobe-title');
            if (!container) return;
            container.innerHTML = '';
            
            let list = currentRole === 'queen' ? queenWardrobe : kingWardrobe;
            titleElem.innerText = currentRole === 'queen' ? "Queen's Wardrobe" : "King's Wardrobe";

            list.forEach((item, index) => {
                let div = document.createElement('div');
                div.className = `wardrobe-item ${index === 0 ? 'selected' : ''}`;
                div.onclick = () => setOutfit(item.name, item.file, div);
                div.innerHTML = `<span>👑 ${item.name}</span>`;
                container.appendChild(div);
            });
        }

        window.onload = populateWardrobe;

        let isPlaying = false;
        function toggleAudio() {
                 function toggleAudio() {
            const audio = document.getElementById('royal-audio');
            const btn = document.getElementById('audio-toggle-btn');
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                btn.innerText = "🎵 Play Rosanna Gallery";
                isPlaying = false;
            } else {
                audio.volume = 1.0;
                audio.play().then(() => {
                    btn.innerText = "🔇 Pause Rosanna Gallery";
                    isPlaying = true;
                }).catch(e => console.log("Audio play blocked"));
            }
        }

        function switchSovereign(role, btn) {
            document.getElementById('btn-queen').classList.remove('selected');
            document.getElementById('btn-king').classList.remove('selected');
            btn.classList.add('selected');
            
            currentRole = role;
            populateWardrobe();

            let list = role === 'queen' ? queenWardrobe : kingWardrobe;
            if(list.length > 0) {
                setOutfit(list[0].name, list[0].file, document.querySelector('.wardrobe-item'));
            }
        }

        function setSkinTone(val, swatch) {
            document.querySelectorAll('.skin-swatch').forEach(s => s.classList.remove('selected'));
            swatch.classList.add('selected');
            characterConfig.skinTone = val;
            updateSummary();
        }

        function setHair(val, btn) {
            updateButtonGroup(btn);
            characterConfig.hair = val;
            updateSummary();
        }

        function setOutfit(name, videoFile, itemElement) {
            document.querySelectorAll('.wardrobe-item').forEach(i => i.classList.remove('selected'));
            if(itemElement) itemElement.classList.add('selected');
            
            characterConfig.outfitName = name;
            characterConfig.outfitVideo = videoFile;
            
            const videoElem = document.getElementById('preview-video');
            videoElem.src = videoFile;
            videoElem.load();
            videoElem.play().catch(e => console.log("Autoplay waiting for interaction"));
            
            updateSummary();
        }

        function setAccessory(val, btn) {
            updateButtonGroup(btn);
            characterConfig.accessory = val;
            updateSummary();
        }

        function goToLikenessChamber() {
            const nameInput = document.getElementById('custom-name-input').value.trim();
            if(nameInput) {
                localStorage.setItem('player_character_name', nameInput);
                window.location.href = 'likeness-chamber.html';
            } else {
                alert("Please enter a character name to begin your journey.");
            }
        }

        function updateButtonGroup(clickedBtn) {
            const parent = clickedBtn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            clickedBtn.classList.add('selected');
        }

        function updateSummary() {
            const summaryElem = document.getElementById('character-summary-text');
            if(!summaryElem) return;
            let nameDisplay = characterConfig.customName ? characterConfig.customName : (currentRole === 'queen' ? 'Queen Rosana' : 'King Benson');
            summaryElem.innerText = `${nameDisplay} | ${characterConfig.skinTone} | ${characterConfig.hair} | ${characterConfig.outfitName}`;
        }
    </script>
</body>
</html>
