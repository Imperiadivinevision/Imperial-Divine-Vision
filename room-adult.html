<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Sovereign Chamber</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.94);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            border-left: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
        }

        .control-sidebar {
            width: 340px;
            background: var(--panel-bg);
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .control-sidebar.right {
            border-right: none;
            border-left: 2px solid var(--gold);
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 8px;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .wardrobe-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .wardrobe-item {
            background: #181410;
            border: 1px solid var(--gold);
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: left;
            color: var(--text-main);
            text-decoration: none;
        }

        .wardrobe-item:hover, .wardrobe-item.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .wardrobe-thumbnail {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border: 1px solid var(--gold);
            border-radius: 3px;
        }

        .skin-palette {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .skin-swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .skin-swatch:hover, .skin-swatch.selected {
            transform: scale(1.15);
            box-shadow: 0 0 10px var(--gold);
        }

        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #0b0907;
        }

        .character-stage-card {
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .character-preview-img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            background: #12100e;
            border: 1px solid var(--gold);
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .confirm-btn, .back-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 12px 28px;
            font-family: 'Georgia', serif;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-decoration: display block;
            text-align: center;
            display: block;
            box-sizing: border-box;
        }

        .confirm-btn:hover, .back-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 15px var(--gold);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Left Customization Sidebar -->
        <div class="control-sidebar">
            <div class="panel-section-title">Sovereign Focus</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setSovereign('Queen Rosana', 'rosanna-vip.png', this)">Queen Rosana</button>
                <button class="option-btn" onclick="setSovereign('King Benson', 'king-benson.png', this)">King Benson</button>
            </div>

            <div class="panel-section-title" style="margin-top: 10px;">Skin Tone</div>
            <div class="skin-palette">
                <div class="skin-swatch selected" style="background-color: #5c3824;" onclick="setSkinTone('Deep Warm', this)" title="Deep Warm"></div>
                <div class="skin-swatch" style="background-color: #8d5524;" onclick="setSkinTone('Rich Brown', this)" title="Rich Brown"></div>
                <div class="skin-swatch" style="background-color: #c68642;" onclick="setSkinTone('Golden Tan', this)" title="Golden Tan"></div>
                <div class="skin-swatch" style="background-color: #e0ac69;" onclick="setSkinTone('Olive', this)" title="Olive"></div>
                <div class="skin-swatch" style="background-color: #f5d0b1;" onclick="setSkinTone('Fair', this)" title="Fair"></div>
            </div>

            <div class="panel-section-title" style="margin-top: 10px;">Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setHair('Braid-Updo', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setHair('Extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setHair('Natural Curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setHair('Royal Waves', this)">Royal Waves</button>
            </div>
        </div>

        <!-- Center Viewport & Character Preview -->
        <div class="character-viewport">
            <div style="margin-bottom: 15px; text-align: center;">
                <h1 style="color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 2px;">Style Your Sovereign</h1>
            </div>
            <div class="character-stage-card">
                <img id="preview-image" class="character-preview-img" src="rosanna-vip.png" alt="Preview">
                <p id="character-summary-text" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">
                    Queen Rosana | Deep Warm | Braid-Updo
                </p>
                <a href="gateway.html" class="back-btn">Return to Gateway</a>
            </div>
        </div>

        <!-- Right Customization Sidebar (Wardrobe) -->
        <div class="control-sidebar right">
            <div class="panel-section-title">Imperial Wardrobe</div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 8px 0;">Click any outfit to style:</p>
            
            <div class="wardrobe-grid" id="wardrobe-list">
                <div class="wardrobe-item selected" onclick="setOutfit('Rosana VIP', 'rosanna-vip.png', this)">
                    <img src="rosanna-vip.png" class="wardrobe-thumbnail"><span>Rosana VIP</span>
                </div>
                <div class="wardrobe-item" onclick="setOutfit('Dress Master', 'dress.png', this)">
                    <img src="dress.png" class="wardrobe-thumbnail"><span>Dress Master</span>
                </div>
                <div class="wardrobe-item" onclick="setOutfit('Robe 1', 'Robe-1.png', this)">
                    <img src="Robe-1.png" class="wardrobe-thumbnail"><span>Robe 1</span>
                </div>
                <div class="wardrobe-item" onclick="setOutfit('Robe 2', 'Robe-2.png', this)">
                    <img src="Robe-2.png" class="wardrobe-thumbnail"><span>Robe 2</span>
                </div>
            </div>

            <div class="panel-section-title" style="margin-top: 10px;">Accessory Type</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setAccessory('Imperial Crown', this)">Crown</button>
                <button class="option-btn" onclick="setAccessory('Gold Circlet', this)">Circlet</button>
                <button class="option-btn" onclick="setAccessory('Ceremonial Veil', this)">Veil</button>
                <button class="option-btn" onclick="setAccessory('Vellet Band', this)">Vellet</button>
            </div>
        </div>

    </div>

    <script>
        let currentSovereign = 'Queen Rosana';
        let characterConfig = {
            skinTone: 'Deep Warm',
            hair: 'Braid-Updo',
            outfitName: 'Rosana VIP',
            outfitImg: 'rosanna-vip.png'
        };

        function setSovereign(name, img, btn) {
            updateButtonGroup(btn);
            currentSovereign = name;
            characterConfig.outfitImg = img;
            characterConfig.outfitName = name;
            document.getElementById('preview-image').src = img;
            updateSummary();
        }

        function setSkinTone(val, swatch) {
            document.querySelectorAll('.skin-swatch').forEach(s => s.classList.remove('selected'));
            swatch.classList.add('selected');
            characterConfig.skinTone = val;
            updateSummary();
        }

        function setHair(val, btn) {
            updateButtonGroup(btn);
            characterConfig.hair = val;
            updateSummary();
        }

        function setOutfit(name, imgUrl, itemElement) {
            document.querySelectorAll('.wardrobe-item').forEach(i => i.classList.remove('selected'));
            itemElement.classList.add('selected');
            characterConfig.outfitName = name;
            characterConfig.outfitImg = imgUrl;
            document.getElementById('preview-image').src = imgUrl;
            updateSummary();
        }

        function setAccessory(val, btn) {
            updateButtonGroup(btn);
        }

        function updateButtonGroup(clickedBtn) {
            clickedBtn.parentElement.querySelectorAll('.option-btn, .skin-swatch').forEach(b => b.classList.remove('selected'));
            clickedBtn.classList.add('selected');
        }

        function updateSummary() {
            document.getElementById('character-summary-text').innerText = 
                `${currentSovereign} | ${characterConfig.skinTone} | ${characterConfig.hair} | ${characterConfig.outfitName}`;
        }
    </script>
</body>
</html>
