<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Realm Overview</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.94);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .gateway-card {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 8px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin: 20px;
        }

        .gateway-card h1 {
            color: var(--gold);
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .cinematic-display {
            width: 100%;
            height: 320px;
            background: #0b0907;
            border: 2px solid var(--gold);
            border-radius: 6px;
            margin: 15px 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cinematic-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gateway-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 12px 20px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            text-align: center;
        }

        .gateway-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
            box-shadow: 0 0 15px var(--gold);
        }
    </style>
</head>
<body>

    <audio id="royal-audio" loop>
        <source src="https://actions.google.com/sounds/v1/ambiences/forest_birds.ogg" type="audio/ogg">
    </audio>

    <div class="gateway-card">
        <h1>Sanctuary & Realm Tour</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Witness the sacred grounds, the grotto, and the eternal peace of our domain.</p>
        
        <div class="cinematic-display">
            <video class="cinematic-video" autoplay loop muted playsinline>
                <source src="7399_2.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>

        <button class="gateway-btn" onclick="toggleAudio()" id="audio-toggle-btn">🎵 Play Realm Ambiance</button>
        <a href="room-adult.html" class="gateway-btn">Enter Sovereign Chamber</a>
        <a href="gateway.html" class="gateway-btn">Return to Main Gateway</a>
    </div>

    <script>
        let isPlaying = false;
        function toggleAudio() {
            const audio = document.getElementById('royal-audio');
            const btn = document.getElementById('audio-toggle-btn');
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                btn.innerText = "🎵 Play Realm Ambiance";
                isPlaying = false;
            } else {
                audio.volume = 0.5;
                audio.play().then(() => {
                    btn.innerText = "🔇 Pause Ambiance";
                    isPlaying = true;
                }).catch(e => console.log("Audio play waiting for user interaction"));
            }
        }
    </script>
</body>
</html>
