<!DOCTYPE html>
<html>
<head>
    <title>Age Verification - Imperial Divine Vision</title>
    <style>
        /* Flowing, reflective imperial background */
        body { 
            font-family: 'Georgia', serif; 
            margin: 0; 
            min-height: 100vh; 
            color: #2c3e50;
            background: linear-gradient(135deg, #FFDAB9, #FFC0CB, #F5F5DC, #FFDAB9);
            background-size: 400% 400%;
            animation: flowBackground 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes flowBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: rgba(255, 255, 255, 0.8); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .royal-branding { position: fixed; bottom: 20px; right: 20px; width: 120px; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Kingdom Chat</h1>
        <p>Please enter your birth year so we can guide you to the right room:</p>
        
        <form id="ageGateForm">
            <label for="birthYear">Enter your birth year:</label><br>
            <input type="number" id="birthYear" required>
            <button type="submit" style="margin-top: 10px;">Enter</button>
        </form>
    </div>

    <img src="official-seal.png" class="royal-branding" alt="Imperial Divine Vision Seal">

    <script>
        document.getElementById('ageGateForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const year = parseInt(document.getElementById('birthYear').value);
            const currentYear = new Date().getFullYear();
            const age = currentYear - year;

            // Creator / Administrator Master Bypass & Adult Routing
            if (year === 2000 || age >= 30) {
                window.location.href = 'room-adult.html';
                return;
            }

            // Age-based routing logic matching your exact files
            if (age >= 8 && age <= 13) {
                window.location.href = 'room-youth.html';
            } else if (age >= 14 && age <= 29) {
                window.location.href = 'room-elder.html';
            } else {
                window.location.href = 'room-kids.html';
            }
        });
    </script>

</body>
</html>
