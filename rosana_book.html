<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rosana and the Evil King - Library Edition</title>
    <style>
        body {
            background-color: #2c1e0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }
        .book-container {
            width: 700px;
            height: 800px;
            background-color: #fdf5e6;
            border: 4px solid #d2b48c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }
        .page-image {
            width: 100%;
            height: 90%;
            object-fit: contain;
        }
        .nav-controls {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        button {
            background-color: #5c3a21;
            color: #fdf5e6;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:hover {
            background-color: #7c4e2d;
        }
        #page-indicator {
            color: #fdf5e6;
            font-size: 16px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="book-container">
    <img id="book-page" class="page-image" src="cover_image.png" alt="Book Page">
    <div class="nav-controls">
        <button onclick="prevPage()">Previous</button>
        <span id="page-indicator">Cover / Page 1</span>
        <button onclick="nextPage()">Next Page</button>
    </div>
</div>

<script>
    const pages = [
        "cover_image.png",
        "parchment_title_page.png",
        "1.png", "2.png", "3.png", "4.png", "5.png",
        "6.png", "7.png", "8.png", "9.png", "10.png",
        "11.png", "12.png", "13.png", "14.png", "15.png",
        "16.png", "17.png", "18.png", "19.png", "20.png",
        "21.png", "22.png", "23.png", "24.png", "25.png"
    ];

    let currentIndex = 0;

    function updateBook() {
        const imgElement = document.getElementById("book-page");
        const indicator = document.getElementById("page-indicator");
        
        imgElement.src = pages[currentIndex];
        
        if (currentIndex === 0) {
            indicator.textContent = "Front Cover";
        } else if (currentIndex === 1) {
            indicator.textContent = "Title Page";
        } else if (currentIndex === pages.length - 1) {
            indicator.textContent = "Back Cover";
        } else {
            indicator.textContent = "Page " + (currentIndex - 1) + " of " + (pages.length - 3);
        }
    }

    function nextPage() {
        if (currentIndex < pages.length - 1) {
            currentIndex++;
            updateBook();
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            updateBook();
        }
    }
</script>

</body>
</html>
