<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rosana and the Evil King - Library Edition</title>
    <style>
        @keyframes emeraldGlow {
            0% { background-color: #032b1f; }
            50% { background-color: #0b1d3a; }
            100% { background-color: #032b1f; }
        }
        body {
            animation: emeraldGlow 12s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        .book-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .page-wrapper {
            position: relative;
            padding: 10px;
            background: linear-gradient(135deg, #d4af37 0%, #1a4d36 50%, #d4af37 100%);
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(11, 45, 58, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdf5e6; 
        }
        .page-image {
            display: block;
            /* Widened rectangular proportions */
            width: 850px;
            height: 580px;
            object-fit: contain;
            border-radius: 4px;
            background-color: #fdf5e6;
        }
        .nav-controls {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
        }
        button {
            background: linear-gradient(to bottom, #1a4d36, #0b1d3a);
            color: #fdf5e6;
            border: 1px solid #d4af37;
            padding: 10px 28px;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        button:hover {
            background: linear-gradient(to bottom, #2b6e51, #16325c);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }
        #page-indicator {
            color: #d4af37;
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

<div class="book-container">
    <div class="page-wrapper">
        <img id="book-page" class="page-image" src="cover_image.png" alt="Book Page">
    </div>
    <div class="nav-controls">
        <button onclick="prevPage()">Previous</button>
        <span id="page-indicator">Front Cover</span>
        <button onclick="nextPage()">Next Page</button>
    </div>
</div>

<script>
    const pages = [
        "cover_image.png",
        "parchment_title_page.png",
        "1.png", "2.png", "3.png", "4.png", "5.png",
        "6.png", "7.png", "8.png", "9.png", "10.png",
        "11.png", "12.png", "13.png", "14.png", "15.png",
        "16.png", "17.png", "18.png", "19.png", "20.png",
        "21.png", "22.png", "23.png", "24.png", "25.png"
    ];

    let currentIndex = 0;

    function updateBook() {
        const imgElement = document.getElementById("book-page");
        const indicator = document.getElementById("page-indicator");
        
        imgElement.style.opacity = '0.3';
        setTimeout(() => {
            imgElement.src = pages[currentIndex];
            imgElement.style.opacity = '1';
        }, 120);
        
        if (currentIndex === 0) {
            indicator.textContent = "Front Cover";
        } else if (currentIndex === 1) {
            indicator.textContent = "Title Page";
        } else if (currentIndex === pages.length - 1) {
            indicator.textContent = "Back Cover";
        } else {
            indicator.textContent = "Page " + (currentIndex - 1) + " of " + (pages.length - 3);
        }
    }

    function nextPage() {
        if (currentIndex < pages.length - 1) {
            currentIndex++;
            updateBook();
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            updateBook();
        }
    }
</script>

</body>
</html>
