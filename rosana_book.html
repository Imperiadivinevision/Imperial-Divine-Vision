<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rosana and the Evil King - Library Edition</title>
    <style>
        body {
            background-color: #0f0904;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #261608 0%, #0f0904 100%);
        }
        .book-container {
            width: 750px;
            height: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .page-wrapper {
            position: relative;
            padding: 12px;
            background: linear-gradient(135deg, #d4af37 0%, #5c3a21 50%, #d4af37 100%);
            border-radius: 8px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8), 0 0 25px rgba(212, 175, 55, 0.2);
        }
        .page-image {
            display: block;
            max-width: 100%;
            max-height: 720px;
            object-fit: contain;
            border-radius: 4px;
            background-color: #1a1006;
        }
        .nav-controls {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
        }
        button {
            background: linear-gradient(to bottom, #3b2314, #21130a);
            color: #fdf5e6;
            border: 1px solid #d4af37;
            padding: 10px 28px;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        button:hover {
            background: linear-gradient(to bottom, #5c3a21, #3b2314);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        #page-indicator {
            color: #d4af37;
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="book-container">
    <div class="page-wrapper">
        <img id="book-page" class="page-image" src="cover_image.png" alt="Book Page">
    </div>
    <div class="nav-controls">
        <button onclick="prevPage()">Previous</button>
        <span id="page-indicator">Front Cover</span>
        <button onclick="nextPage()">Next Page</button>
    </div>
</div>

<script>
    const pages = [
        "cover_image.png",
        "parchment_title_page.png",
        "1.png", "2.png", "3.png", "4.png", "5.png",
        "6.png", "7.png", "8.png", "9.png", "10.png",
        "11.png", "12.png", "13.png", "14.png", "15.png",
        "16.png", "17.png", "18.png", "19.png", "20.png",
        "21.png", "22.png", "23.png", "24.png", "25.png"
    ];

    let currentIndex = 0;

    function updateBook() {
        const imgElement = document.getElementById("book-page");
        const indicator = document.getElementById("page-indicator");
        
        // Soft transition effect on turn
        imgElement.style.opacity = '0.3';
        setTimeout(() => {
            imgElement.src = pages[currentIndex];
            imgElement.style.opacity = '1';
        }, 150);
        
        if (currentIndex === 0) {
            indicator.textContent = "Front Cover";
        } else if (currentIndex === 1) {
            indicator.textContent = "Title Page";
        } else if (currentIndex === pages.length - 1) {
            indicator.textContent = "Back Cover";
        } else {
            indicator.textContent = "Page " + (currentIndex - 1) + " of " + (pages.length - 3);
        }
    }

    function nextPage() {
        if (currentIndex < pages.length - 1) {
            currentIndex++;
            updateBook();
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            updateBook();
        }
    }
</script>

</body>
</html>
