<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Imperial Divine Vision | Sanctuary of the Sovereign</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #040a08;
            background-image: url('garden_border_pattern.png');
            color: #d4af37;
            font-family: 'Cinzel', serif;
            text-align: center;
        }
        nav { 
            padding: 15px 20px; 
            background: rgba(4, 10, 8, 0.95);
            border-bottom: 2px solid #d4af37;
        }
        nav a { 
            color: #f5f2eb; 
            text-decoration: none; 
            margin: 0 15px; 
            font-weight: bold; 
        }
        .cinematic-container {
            max-width: 650px;
            width: 90%;
            margin: 40px auto;
            background: rgba(28, 24, 20, 0.95);
            border: 2px solid #d4af37;
            padding: 25px;
            border-radius: 12px;
        }
        .cinematic-video {
            width: 100%;
            max-height: 350px;
            background: #0b0907;
            border: 2px solid #d4af37;
            border-radius: 6px;
        }
        .royal-btn {
            background: #181410;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 12px 20px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            border-radius: 4px;
            text-transform: uppercase;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Background Audio Element -->
    <audio id="royal-audio" loop preload="auto">
        <source src="https://upload.wikimedia.org/wikipedia/commons/b/b2/En_sourdine.ogg" type="audio/ogg">
    </audio>

    <nav>
        <a href="index.html">🏠 Sanctuary Home</a>
        <a href="library.html">Library</a>
        <a href="seal.html">Our Official Seal</a>
    </nav>

    <div class="cinematic-container">
        <h2 style="color: #d4af37; margin-top: 0;">The Grand Imperial Journey</h2>
        
        <!-- Video Player with explicit source -->
        <video id="sequence-video" class="cinematic-video" controls playsinline>
            Your browser does not support video.
        </video>

        <button class="royal-btn" onclick="toggleAudio()" id="audio-toggle-btn">🔊 Play Realm Music & Ambiance</button>
    </div>

    <script>
        // Direct relative filenames from your repository
        const cinematicPlaylist = [
            "palace-tour-1.mp4",
            "palace-tour-2.mp4",
            "palace-tour-4.mp4",
            "palace-tour-3.mp4",
            "palace-tour-1.mp4",
            "palace-tour-7.mp4",
            "palace-tour-8.mp4",
            "palace-tour-7.mp4",
            "palace-tour-1.mp4",
            "palace-tour-9.mp4",
            "palace-tour-6.mp4",
            "palace-tour-10.mp4",
            "real-palace-structure-1.mp4",
            "real-palace-structure-2.mp4",
            "real-palace-structure-3.mp4",
            "real-palace-structure-4.mp4",
            "real-palace-structure-5.mp4",
            "real-palace-structure-6.mp4",
            "real-palace-structure-7.mp4",
            "real-palace-structure-8.mp4",
            "palace-tour-6.mp4",
            "prayer-room-1.mp4",
            "prayer-room-2.mp4",
            "prayer-room-3.mp4",
            "prayer-room-5.mp4",
            "imperial-palace.mp4",
            "imperial-palace-hallway.mp4",
            "imperial-palace-guess-room.mp4",
            "imperial-dinner-room.mp4",
            "imperial-bedroom-CINEMATIC.mp4",
            "king-queen-bed-room.mp4",
            "king-benson-imperial-CINEMATIC.mp4",
            "rosanna-imperial-outfit-CINEMATIC.mp4",
            "king-queen-moving-carriage-CINEMATIC.mp4",
            "king-queen-throne-armor-CINEMATIC.mp4"
        ];

        let currentIndex = 0;
        const videoElement = document.getElementById("sequence-video");

        function playNextVideo() {
            if (cinematicPlaylist.length === 0) return;
            videoElement.src = cinematicPlaylist[currentIndex];
            videoElement.load();
            videoElement.play().catch(e => console.log("Playback waiting for user interaction"));
            currentIndex = (currentIndex + 1) % cinematicPlaylist.length;
        }

        videoElement.onended = playNextVideo;

        window.onload = () => {
            playNextVideo();
        };

        let isPlaying = false;
        function toggleAudio() {
            const audio = document.getElementById('royal-audio');
            const btn = document.getElementById('audio-toggle-btn');
            if (!audio) return;
            
            if (isPlaying) {
                audio.pause();
                btn.innerText = "🔊 Play Realm Music & Ambiance";
                isPlaying = false;
            } else {
                audio.volume = 1.0;
                audio.play().then(() => {
                    btn.innerText = "🔇 Pause Realm Music";
                    isPlaying = true;
                }).catch(error => {
                    console.log("Audio prevented:", error);
                });
            }
        }
    </script>
</body>
</html>
