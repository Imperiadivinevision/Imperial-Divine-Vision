<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Imperial Divine Vision</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #040a08;
            background-repeat: repeat;
            background-position: center;
            background-size: 400px auto;
            background-image: url('garden_border_pattern.png');
            animation: breatheGarden 60s infinite alternate ease-in-out;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes breatheGarden {
            0% {
                background-size: 400px auto;
                background-position: center center;
            }
            50% {
                background-size: 410px auto;
                background-position: center top;
            }
            100% {
                background-size: 395px auto;
                background-position: center bottom;
            }
        }

        nav { padding: 30px; }
        nav a { margin: 15px; color: #d4af37; text-decoration: none; font-size: 1.5rem; transition: 0.3s; }
        nav a:hover { color: #ffb7c5; }
        
        .hero-image { 
            width: 80%; 
            max-width: 600px; 
            border: 5px solid #d4af37; 
            margin-top: 20px; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); 
            border-radius: 10px;
        }
        h1 { margin-top: 50px; text-shadow: 2px 2px 4px #000; padding: 0 20px; }

        /* Cinematic Tour & Audio Styles */
        .cinematic-container {
            max-width: 650px;
            width: 90%;
            margin: 30px auto;
            background: rgba(28, 24, 20, 0.94);
            border: 2px solid #d4af37;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .cinematic-display {
            width: 100%;
            height: 320px;
            background: #0b0907;
            border: 2px solid #d4af37;
            border-radius: 6px;
            margin: 15px 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cinematic-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .royal-btn {
            background: #181410;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 12px 20px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            text-align: center;
        }

        .royal-btn:hover {
            background: #d4af37;
            color: #12100e;
            font-weight: bold;
            box-shadow: 0 0 15px #d4af37;
        }

        @keyframes bounceGlow {
            0%, 100% { transform: translateY(-50%) translateY(0); opacity: 0.6; text-shadow: 0 0 5px rgba(212,175,55,0.3); }
            50% { transform: translateY(-50%) translateY(10px); opacity: 1; text-shadow: 0 0 15px rgba(212,175,55,0.9); }
        }
    </style>
</head>
<body>

    <!-- Background music audio source -->
    <audio id="royal-audio" loop>
        <source src="https://actions.google.com/sounds/v1/ambiences/forest_birds.ogg" type="audio/ogg">
    </audio>

    <nav>
        <a href="index.html">Home</a>
        <a href="library.html">Library</a>
        <a href="seal.html">Our Official Seal</a>
        <a href="community.html">Community Chat</a>
        <a href="vip.html">VIP Creative Area</a>
    </nav>

    <!-- Imperial Homepage Elite Glow Header -->
    <div style="text-align: center; margin: 20px auto; position: relative;">
        <!-- Left Side Floating Scroll Down Indicator -->
        <div style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; color: #d4af37; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; animation: bounceGlow 2s infinite ease-in-out;">
            <span style="writing-mode: vertical-lr; text-orientation: mixed; text-transform: uppercase; margin-bottom: 10px;">Scroll Down</span>
            <span style="font-size: 22px;">↓</span>
        </div>
        
        <!-- Breathtaking Framed Homepage Masterpiece -->
        <div style="display: inline-block; padding: 12px; background: rgba(4, 25, 17, 0.85); border: 3px solid #d4af37; border-radius: 16px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.6); backdrop-filter: blur(8px);">
            <img src="cover_image.png" alt="Homepage Sanctuary" style="max-width: 480px; width: 100%; border-radius: 10px; border: 2px solid rgba(212, 175, 55, 0.5); display: block;">
        </div>
    </div>

    <!-- Sequential Cinematic Tour Section -->
    <div class="cinematic-container">
        <h2 style="color: #d4af37; margin-top: 0; font-size: 1.4rem; letter-spacing: 2px;">Sanctuary & Realm Tour</h2>
        <p style="color: #b3a896; font-size: 0.9rem;">Witness the sacred grounds, the grotto, and the eternal peace of our domain.</p>
        
        <div class="cinematic-display">
            <video id="sequence-video" class="cinematic-video" autoplay muted playsinline>
                Your browser does not support video.
            </video>
        </div>

        <button class="royal-btn" onclick="toggleAudio()" id="audio-toggle-btn">🎵 Play Realm Music & Ambiance</button>
        <a href="room-adult.html" class="royal-btn">Enter Sovereign Chamber</a>
    </div>

    <script>
        // Your organized sequence playlist array
        const cinematicPlaylist = [
            "prayer-room-1.mp4",
            "prayer-room-2.mp4",
            "prayer-room-3.mp4",
            "prayer-room-5.mp4",
            "imperial-palace.mp4",
            "imperial-palace-hallway.mp4",
            "imperial-palace-guess-room.mp4",
            "imperial-dinner-room.mp4",
            "king-queen-bed-room.mp4"
        ];

        let currentIndex = 0;
        const videoElement = document.getElementById("sequence-video");

        function playNextVideo() {
            if (cinematicPlaylist.length === 0) return;
            videoElement.src = cinematicPlaylist[currentIndex];
            videoElement.load();
            videoElement.play().catch(e => console.log("Autoplay waiting for interaction"));
            
            // Move to the next video, loop back to the beginning when finished
            currentIndex = (currentIndex + 1) % cinematicPlaylist.length;
        }

        // Automatically play the next video in order when the current one ends
        videoElement.onended = playNextVideo;

        // Initialize on load
        window.onload = () => {
            playNextVideo();
        };

        // Audio toggle handler
        let isPlaying = false;
        function toggleAudio() {
            const audio = document.getElementById('royal-audio');
            const btn = document.getElementById('audio-toggle-btn');
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                btn.innerText = "🎵 Play Realm Music & Ambiance";
                isPlaying = false;
            } else {
                audio.volume = 0.6;
                audio.play().then(() => {
                    btn.innerText = "🔇 Pause Realm Music";
                    isPlaying = true;
                }).catch(e => console.log("Audio play waiting for user interaction"));
            }
        }
    </script>
</body>
</html>
