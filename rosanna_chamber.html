<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chamber of Rosanna</title>
    <style>
        body { background: #2b2b2b; color: #4a3728; font-family: sans-serif; text-align: center; padding: 20px; }
        .book-container { perspective: 2000px; width: 600px; margin: 50px auto; }
        .book { width: 100%; height: 800px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .page { position: absolute; width: 100%; height: 100%; padding: 60px; background: #f4e4bc; border: 15px solid #c5a059; box-sizing: border-box; backface-visibility: hidden; }
        .page.back { transform: rotateY(180deg); }
        .book.flipped { transform: rotateY(180deg); }
    </style>
</head>
<body>

    <h1>Rosanna and the Evil King</h1>

    <div class="book-container">
        <div class="book" onclick="this.classList.toggle('flipped')">
            <!-- Page 1 (Front) -->
            <div class="page">
                <h2>Introduction: The Village of Hikmid</h2>
                <p style="text-align: left;">Rosana was a village girl born from a handsome sailor called Tarma and a beautiful performer called Jirmak... (rest of your text here)</p>
            </div>
            <!-- Page 2 (Back) -->
            <div class="page back">
                <img src="jirmak_abandoned.png" alt="Jirmak" style="width:100%;">
            </div>
        </div>
    </div>

    <script>
        // This makes the clicking work!
    </script>

</body>
</html>
