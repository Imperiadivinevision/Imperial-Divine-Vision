<!DOCTYPE html>
<html>
<head>
    <title>Creator's Imperial Monitoring Station</title>
    <style>
        body { font-family: 'Georgia', serif; margin: 0; padding: 20px; background-color: #1a1a1a; color: #fff; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        
        /* The Monitor Styles */
        .monitor { padding: 20px; border-radius: 15px; cursor: pointer; transition: transform 0.3s; border: 2px solid #FFD700; }
        .monitor:hover { transform: scale(1.05); }
        .m-lib { background-color: #E3F2FD; color: #000; } /* Baby Blue */
        .m-com { background-color: #FCE4EC; color: #000; } /* Baby Pink */
        .m-vip { background-color: #E8F5E9; color: #000; } /* Baby Green */
        .m-cre { background-color: #FFF3E0; color: #000; } /* Baby Orange */

        .chat-input { width: 100%; margin-top: 10px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Imperial Monitoring Station 📹</h1>
    <div class="dashboard">
        <!-- Clicking these acts as your "Camera" access -->
        <div class="monitor m-lib" onclick="alert('Opening Library Camera...')">
            <h2>Library Monitor</h2>
            <textarea class="chat-input" placeholder="View messages 💬"></textarea>
        </div>

        <div class="monitor m-com" onclick="alert('Opening Community Camera...')">
            <h2>Community Monitor</h2>
            <textarea class="chat-input" placeholder="Live chat activity... ✨"></textarea>
        </div>

        <div class="monitor m-vip" onclick="alert('Opening VIP Camera...')">
            <h2>VIP Monitor</h2>
            <textarea class="chat-input" placeholder="Private VIP logs... 👑"></textarea>
        </div>
    </div>

    <script>
        // Emoji Support is built into all textareas automatically by the browser!
        // Your users can right-click any textarea and select "Emoji" or use their keyboard.
    </script>
</body>
</html>
