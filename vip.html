<!DOCTYPE html>
<html>
<head>
    <title>VIP Creative Area - Creator Access</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #50C878, #00A86B, #007BA7, #005F73);
            background-size: 400% 400%;
            animation: flowBackground 15s ease infinite;
            color: #fdfdfd;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        @keyframes flowBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px; text-align: center; max-width: 600px; width: 100%; }
        textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background: #FFD700; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

    <!-- This is your direct access gate -->
    <div class="container" id="vipArea">
        <h1>Welcome, Creator</h1>
        <p>You have full administrative control over this sanctuary.</p>
        
        <textarea id="chatBox" rows="5" placeholder="Manage content here..."></textarea><br>
        <button onclick="sendMessage()">Send Message</button>
        <button onclick="deleteContent()" style="background: #ff4d4d;">Delete Content</button>
    </div>

    <script>
        function sendMessage() {
            alert("Message broadcasted to the Empire.");
        }
        function deleteContent() {
            document.getElementById('chatBox').value = "";
            alert("Content deleted.");
        }
    </script>
</body>
</html>
