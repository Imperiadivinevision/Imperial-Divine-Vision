<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Archives | Imperial Divine Vision</title>
    <!-- Importing the elegant, handwritten-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 
            0% { box-shadow: 0 0 10px currentColor; } 
            50% { box-shadow: 0 0 25px currentColor; } 
            100% { box-shadow: 0 0 10px currentColor; } 
        }
        
        body { 
            background: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Great Vibes', cursive; /* Applied your preferred handwriting style */
            text-align: center; 
            padding: 20px; 
        }
        
        h1, h2 { padding-bottom: 10px; margin-top: 40px; animation: fadeIn 2s ease-out; }
        
        #oracle-bar { color: #ffffff; font-style: italic; margin-bottom: 30px; animation: fadeIn 5s; cursor: help; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 20px; }
        
        .card { 
            border: 3px solid; 
            padding: 15px; 
            border-radius: 15px; 
            background: #1a1a2e; 
            animation: glow 3s infinite ease-in-out; 
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Reflective shimmer effect */
        .card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 40%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 60%);
            animation: shimmer 5s infinite;
        }
        @keyframes shimmer { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(50%, 50%) rotate(360deg); } }

        .card:hover { transform: scale(1.05); }
        
        /* Precise Color Coding */
        .palace { color: #ffd700; border-color: #ffd700; }
        .priest { color: #800080; border-color: #800080; }
        .minister { color: #dc143c; border-color: #dc143c; }
        .villager { color: #daa520; border-color: #daa520; }
        
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; }
        h3 { font-size: 1.8em; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>The Archives of the Divine Vision</h1>
    <div id="oracle-bar">"Where the whispers of the past ignite the fires of the future."</div>
    
    <!-- Gallery Structure Remains Consistent -->
    <h2 class="palace">The Imperial Dynasty</h2>
    <div class="gallery">
        <div class="card palace"><img src="king_benson.png" alt="King Benson"><h3>King Benson</h3></div>
        <!-- (Other cards follow the same pattern) -->
    </div>
    <!-- Add other sections here -->
</body>
</html>
