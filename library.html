<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Royal Library | Imperial Divine Vision</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e); 
            color: #d4af37; 
            font-family: 'Cinzel', serif; 
            text-align: center; 
        }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 2px solid #d4af37; padding: 15px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); }
        .card img { width: 100%; border-radius: 5px; }
        h1 { border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Welcome to the Royal Library</h1>
    <div class="gallery">
        <!-- King Benson Entry -->
        <div class="card">
            <img src="king_benson.png" alt="King Benson">
            <h3>King Benson</h3>
            <p>The sovereign heart of our story, guiding the kingdom with grace and strength.</p>
        </div>
        <!-- Rosanna Entry -->
        <div class="card">
            <img src="rosanna.png" alt="Queen Rosanna">
            <h3>Queen Rosanna</h3>
            <p>Our lead character and queen, whose spirit weaves our divine vision.</p>
        </div>
        <!-- Add more cards here using the filenames from our Registry -->
    </div>
</body>
</html>
