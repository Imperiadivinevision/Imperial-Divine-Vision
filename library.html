<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Royal Library</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Cinzel', serif; text-align: center; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; }
        
        /* This is the "Card" container that holds the image and description */
        .card { 
            border: 2px solid #d4af37; padding: 20px; width: 300px; 
            cursor: pointer; transition: 0.5s; background: #1a1a2e; border-radius: 15px; 
        }
        
        /* This creates the glow effect when you click */
        .card.active { box-shadow: 0 0 30px #d4af37; transform: scale(1.05); }
        
        .card img { width: 100%; border-radius: 10px; }
        
        /* This hides the text until you click */
        .details { display: none; margin-top: 15px; color: #fff; line-height: 1.6; }
        .card.active .details { display: block; }
    </style>
</head>
<body>
    <h1>Welcome to the Royal Library</h1>
    <div class="gallery">
        <!-- Card 1 -->
        <div class="card" onclick="this.classList.toggle('active')">
            <img src="king_benson.png" alt="King Benson">
            <h3>King Benson</h3>
            <div class="details">
                <p>The sovereign heart of our story, guiding the kingdom with grace and strength.</p>
            </div>
        </div>
        <!-- Card 2 -->
        <div class="card" onclick="this.classList.toggle('active')">
            <img src="rosanna.png" alt="Queen Rosanna">
            <h3>Queen Rosanna</h3>
            <div class="details">
                <p>The Queen who weaves our divine vision.</p>
            </div>
        </div>
    </div>

    <script>
        // This script handles the glow and showing the text
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
