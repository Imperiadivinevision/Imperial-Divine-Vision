<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Character Creation Engine</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.98);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
            height: 100vh;
            width: 100%;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
        }

        .control-sidebar {
            width: 340px;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 8px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 3px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
        }

        .avatar-canvas {
            position: relative;
            width: 260px;
            height: 380px;
            background: #1a1612;
            border: 2px solid var(--gold);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Character Figure Styling */
        .character-figure {
            position: relative;
            width: 140px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-head {
            width: 65px;
            height: 80px;
            border-radius: 35px 35px 30px 30px;
            background-color: #5c3824;
            position: absolute;
            top: 10px;
            z-index: 3;
            transition: background-color 0.3s ease;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
        }

        .avatar-hair-style {
            position: absolute;
            top: -5px;
            width: 75px;
            height: 45px;
            background-color: #2b1d11;
            border-radius: 35px 35px 10px 10px;
            z-index: 4;
            transition: all 0.3s ease;
        }

        .avatar-body {
            width: 110px;
            height: 150px;
            background-color: var(--gold);
            border-radius: 50px 50px 20px 20px;
            position: absolute;
            top: 85px;
            z-index: 2;
            transition: all 0.3s ease;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #12100e;
            font-size: 0.7rem;
            font-weight: bold;
            padding-top: 40px;
            box-sizing: border-box;
        }

        .action-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 10px var(--gold);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Creator Control Panel -->
        <div class="control-sidebar">
            <div class="panel-section-title">1. Base Form & Gender</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('base', 'female', this)">Woman</button>
                <button class="option-btn" onclick="setTrait('base', 'male', this)">Man</button>
            </div>

            <div class="panel-section-title">2. Skin Tone</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('skin', '#5c3824', this)">Deep Warm</button>
                <button class="option-btn" onclick="setTrait('skin', '#8d5524', this)">Rich Brown</button>
                <button class="option-btn" onclick="setTrait('skin', '#c68642', this)">Golden Tan</button>
                <button class="option-btn" onclick="setTrait('skin', '#f5d0b1', this)">Fair</button>
            </div>

            <div class="panel-section-title">3. Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('hair', 'Braid-Updo', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setTrait('hair', 'Extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setTrait('hair', 'Natural Curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setTrait('hair', 'Royal Waves', this)">Royal Waves</button>
            </div>

            <div class="panel-section-title">4. Body Build</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('body', '110px', this)">Regal / Standard</button>
                <button class="option-btn" onclick="setTrait('body', '130px', this)">Athletic Build</button>
            </div>

            <div class="panel-section-title">5. Attire & Robes</div>
            <div class="option-grid" style="grid-template-columns: 1fr;">
                <button class="option-btn selected" onclick="setTrait('outfit', 'Sovereign Robes', this)">Sovereign Robes</button>
                <button class="option-btn" onclick="setTrait('outfit', 'Imperial Abaya', this)">Imperial Abaya</button>
            </div>
        </div>

        <!-- Live Game Creator Stage -->
        <div class="character-viewport">
            <h2 style="color: var(--gold); position: absolute; top: 15px; margin: 0; font-size: 1.1rem;">Likeness Creation Studio</h2>
            
            <div class="avatar-canvas">
                <div class="character-figure">
                    <div id="avatar-hair" class="avatar-hair-style"></div>
                    <div id="avatar-head" class="avatar-head"></div>
                    <div id="avatar-body" class="avatar-body">Sovereign Robes</div>
                </div>
            </div>

            <a href="gateway.html" class="action-btn">Save & Enter Realm</a>
        </div>
    </div>

    <script>
        let characterBuild = {
            base: 'female',
            skin: '#5c3824',
            hair: 'Braid-Updo',
            body: '110px',
            outfit: 'Sovereign Robes'
        };

        function setTrait(category, value, btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            characterBuild[category] = value;
            updateAvatarDisplay();
        }

        function updateAvatarDisplay() {
            document.getElementById('avatar-head').style.backgroundColor = characterBuild.skin;
            document.getElementById('avatar-body').style.width = characterBuild.body;
            document.getElementById('avatar-body').innerText = characterBuild.outfit;
            
            // Adjust hair visual hints based on selection
            const hairElem = document.getElementById('avatar-hair');
            if (characterBuild.hair === 'Braid-Updo') {
                hairElem.style.borderRadius = '35px 35px 10px 10px';
                hairElem.style.height = '45px';
            } else if (characterBuild.hair === 'Extensions') {
                hairElem.style.borderRadius = '35px 35px 25px 25px';
                hairElem.style.height = '60px';
            } else if (characterBuild.hair === 'Natural Curls') {
                hairElem.style.borderRadius = '50%';
                hairElem.style.height = '50px';
            } else {
                hairElem.style.borderRadius = '20px 20px 15px 15px';
                hairElem.style.height = '40px';
            }
        }
    </script>
</body>
</html>
