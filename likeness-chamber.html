<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Character Creation Engine</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.98);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #b3a896;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
            height: 100vh;
            width: 100%;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
        }

        .control-sidebar {
            width: 340px;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 8px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 3px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
        }

        .avatar-canvas {
            position: relative;
            width: 300px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 0.3s ease;
        }

        .action-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Creator Control Panel -->
        <div class="control-sidebar">
            <div class="panel-section-title">1. Base Form & Gender</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('base', 'female', this)">Woman</button>
                <button class="option-btn" onclick="setTrait('base', 'male', this)">Man</button>
            </div>

            <div class="panel-section-title">2. Skin Tone</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('skin', 'deep', this)">Deep Warm</button>
                <button class="option-btn" onclick="setTrait('skin', 'rich', this)">Rich Brown</button>
                <button class="option-btn" onclick="setTrait('skin', 'golden', this)">Golden Tan</button>
                <button class="option-btn" onclick="setTrait('skin', 'fair', this)">Fair</button>
            </div>

            <div class="panel-section-title">3. Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('hair', 'braids', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setTrait('hair', 'extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setTrait('hair', 'curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setTrait('hair', 'waves', this)">Royal Waves</button>
            </div>

            <div class="panel-section-title">4. Body Build</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('body', 'regal', this)">Regal / Standard</button>
                <button class="option-btn" onclick="setTrait('body', 'athletic', this)">Athletic Build</button>
            </div>

            <div class="panel-section-title">5. Attire & Robes</div>
            <div class="option-grid" style="grid-template-columns: 1fr;">
                <button class="option-btn selected" onclick="setTrait('outfit', 'robes', this)">Sovereign Robes</button>
                <button class="option-btn" onclick="setTrait('outfit', 'abaya', this)">Imperial Abaya</button>
            </div>
        </div>

        <!-- Live Game Creator Stage -->
        <div class="character-viewport">
            <h2 style="color: var(--gold); position: absolute; top: 15px; margin: 0; font-size: 1.1rem;">Likeness Creation Studio</h2>
            
            <div class="avatar-canvas" id="avatar-builder">
                <div id="layer-base" class="avatar-layer" style="background-color: #5c3824; border-radius: 4px;"></div>
                <div id="layer-body" class="avatar-layer"></div>
                <div id="layer-outfit" class="avatar-layer"></div>
                <div id="layer-hair" class="avatar-layer"></div>
            </div>

            <a href="gateway.html" class="action-btn" style="position: absolute; bottom: 15px;">Save & Enter Realm</a>
        </div>
    </div>

    <script>
        let characterBuild = {
            base: 'female',
            skin: 'deep',
            hair: 'braids',
            body: 'regal',
            outfit: 'robes'
        };

        function setTrait(category, value, btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            characterBuild[category] = value;
            updateAvatarDisplay();
        }

        function updateAvatarDisplay() {
            const baseLayer = document.getElementById('layer-base');
            if (characterBuild.skin === 'deep') baseLayer.style.backgroundColor = '#5c3824';
            else if (characterBuild.skin === 'rich') baseLayer.style.backgroundColor = '#8d5524';
            else if (characterBuild.skin === 'golden') baseLayer.style.backgroundColor = '#c68642';
            else if (characterBuild.skin === 'fair') baseLayer.style.backgroundColor = '#f5d0b1';
        }
    </script>
</body>
</html>
