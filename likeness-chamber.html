<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Likeness Creation Studio</title>
    <style>
        :root {
            --bg-dark: #0c0b0a;
            --panel-bg: rgba(22, 19, 16, 0.95);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
            --text-muted: #9e9382;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar mimicking RPG game menus */
        .game-top-bar {
            height: 40px;
            background: #14110e;
            border-bottom: 1px solid var(--gold);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .game-top-bar span.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 40px);
            width: 100%;
            box-sizing: border-box;
        }

        /* Right Side Selector Grid (RPG Style) */
        .control-sidebar {
            width: 380px;
            background: var(--panel-bg);
            border-left: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 12px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-title {
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
            margin-top: 5px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .option-card {
            background: #1b1713;
            border: 1px solid #3a3227;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .option-card:hover, .option-card.selected {
            border-color: var(--gold);
            color: var(--text-main);
            background: #26201a;
        }

        .option-card.selected {
            box-shadow: inset 0 0 8px rgba(212, 175, 55, 0.4);
            font-weight: bold;
        }

        /* Main Character Preview Stage */
        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #241e17 0%, #0c0b0a 80%);
        }

        /* Simulated 3D Character Model Container */
        .character-model-wrapper {
            position: relative;
            width: 260px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        /* Character Body Parts Styled like Game Assets */
        .model-head {
            width: 60px;
            height: 75px;
            border-radius: 30px 30px 25px 25px;
            position: absolute;
            top: 20px;
            z-index: 5;
            transition: background-color 0.3s ease;
        }

        .model-hair {
            position: absolute;
            top: 8px;
            width: 72px;
            height: 45px;
            background-color: #2b1d11;
            border-radius: 36px 36px 15px 15px;
            z-index: 6;
            transition: all 0.3s ease;
        }

        .model-torso {
            width: 90px;
            height: 110px;
            border-radius: 15px;
            position: absolute;
            top: 90px;
            z-index: 3;
            transition: background-color 0.3s ease;
        }

        /* Activewear: Crop Top and Leggings */
        .model-crop-top {
            width: 94px;
            height: 55px;
            background-color: #2a3b5c; /* Blue activewear matching theme */
            border-radius: 12px;
            position: absolute;
            top: 90px;
            z-index: 4;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .model-arms {
            width: 170px;
            height: 40px;
            background-color: inherit;
            position: absolute;
            top: 95px;
            z-index: 2;
            border-radius: 20px;
        }

        .model-legs {
            width: 76px;
            height: 190px;
            background-color: #242433; /* Dark purple/blue leggings */
            border-radius: 10px;
            position: absolute;
            top: 195px;
            z-index: 3;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.4);
        }

        .action-footer {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .game-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: none;
            padding: 10px 24px;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .game-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>

    <!-- Top Game Navigation Bar -->
    <div class="game-top-bar">
        <span>L1 / R1: Rotate</span>
        <span>Abilities</span>
        <span>Skills</span>
        <span class="active">Appearance</span>
    </div>

    <div class="container">
        <!-- Main Character Preview Viewport -->
        <div class="character-viewport">
            <div class="character-model-wrapper">
                <div id="model-hair" class="model-hair"></div>
                <div id="model-head" class="model-head"></div>
                <div id="model-arms" class="model-arms"></div>
                <div id="model-torso" class="model-torso"></div>
                <div id="model-crop-top" class="model-crop-top"></div>
                <div id="model-legs" class="model-legs"></div>
            </div>

            <div class="action-footer">
                <a href="gateway.html" class="game-btn">Save & Enter Realm</a>
            </div>
        </div>

        <!-- Right Side RPG Customization Grid -->
        <div class="control-sidebar">
            <div class="panel-title">Character Model</div>
            <div class="option-grid">
                <div class="option-card selected" onclick="setTrait('base', 'female', this)">Woman</div>
                <div class="option-card" onclick="setTrait('base', 'male', this)">Man</div>
            </div>

            <div class="panel-title">Skin Tone</div>
            <div class="option-grid">
                <div class="option-card selected" onclick="setTrait('skin', '#5c3824', this)" style="background: #5c3824; color: #fff;">Deep Warm</div>
                <div class="option-card" onclick="setTrait('skin', '#8d5524', this)" style="background: #8d5524; color: #fff;">Rich Brown</div>
                <div class="option-card" onclick="setTrait('skin', '#c68642', this)" style="background: #c68642; color: #fff;">Golden Tan</div>
                <div class="option-card" onclick="setTrait('skin', '#f5d0b1', this)" style="background: #f5d0b1; color: #333;">Fair</div>
            </div>

            <div class="panel-title">Hairstyle</div>
            <div class="option-grid" style="grid-template-columns: repeat(2, 1fr);">
                <div class="option-card selected" onclick="setTrait('hair', 'Braid-Updo', this)">Braid-Updo</div>
                <div class="option-card" onclick="setTrait('hair', 'Extensions', this)">Extensions</div>
                <div class="option-card" onclick="setTrait('hair', 'Natural Curls', this)">Natural Curls</div>
                <div class="option-card" onclick="setTrait('hair', 'Royal Waves', this)">Royal Waves</div>
            </div>

            <div class="panel-title">Attire (Activewear)</div>
            <div class="option-grid" style="grid-template-columns: 1fr;">
                <div class="option-card selected">Crop Top & Leggings</div>
            </div>
        </div>
    </div>

    <script>
        let characterBuild = {
            base: 'female',
            skin: '#5c3824',
            hair: 'Braid-Updo'
        };

        function setTrait(category, value, card) {
            const parent = card.parentElement;
            parent.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            characterBuild[category] = value;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('model-head').style.backgroundColor = characterBuild.skin;
            document.getElementById('model-arms').style.backgroundColor = characterBuild.skin;
            document.getElementById('model-torso').style.backgroundColor = characterBuild.skin;
            
            const hairElem = document.getElementById('model-hair');
            if (characterBuild.hair === 'Braid-Updo') {
                hairElem.style.borderRadius = '36px 36px 15px 15px';
                hairElem.style.height = '45px';
            } else if (characterBuild.hair === 'Extensions') {
                hairElem.style.borderRadius = '36px 36px 25px 25px';
                hairElem.style.height = '65px';
            } else if (characterBuild.hair === 'Natural Curls') {
                hairElem.style.borderRadius = '50%';
                hairElem.style.height = '50px';
            } else {
                hairElem.style.borderRadius = '20px 20px 15px 15px';
                hairElem.style.height = '38px';
            }
        }

        updateDisplay();
    </script>
</body>
</html>
