<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Capital: Advanced Character Creation Engine</title>
    <style>
        :root {
            --bg-dark: #12100e;
            --panel-bg: rgba(28, 24, 20, 0.98);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-main: #f5f2eb;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
            height: 100vh;
            width: 100%;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
        }

        /* Sidebar for Controls */
        .control-sidebar {
            width: 340px;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 8px;
            overflow-y: auto;
        }

        .panel-section-title {
            color: var(--gold);
            font-size: 0.8rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 3px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .option-btn {
            background: #181410;
            color: var(--text-main);
            border: 1px solid var(--gold);
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .option-btn:hover, .option-btn.selected {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        /* Main Viewport for Character Display */
        .character-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 8px;
        }

        .avatar-canvas {
            position: relative;
            width: 300px;
            height: 500px; /* Taller canvas for full body */
            background: #1a1612;
            border: 2px solid var(--gold);
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Full-Body SVG Character Figure (Simplified for Code) */
        .character-figure {
            position: relative;
            width: 160px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Head Area */
        .avatar-head {
            width: 60px;
            height: 70px;
            border-radius: 30px 30px 25px 25px;
            position: absolute;
            top: 20px;
            z-index: 10;
            transition: background-color 0.3s ease;
        }

        .avatar-hair-style {
            position: absolute;
            top: 5px;
            width: 70px;
            height: 40px;
            background-color: #2b1d11;
            border-radius: 35px 35px 15px 15px;
            z-index: 11;
            transition: all 0.3s ease;
        }

        /* Body Area (Torso & Limbs) */
        .avatar-torso {
            width: 80px;
            height: 120px;
            border-radius: 20px 20px 10px 10px;
            position: absolute;
            top: 85px;
            z-index: 5;
            transition: background-color 0.3s ease;
        }

        .avatar-arms {
            width: 120px;
            height: 110px;
            border-radius: 10px;
            position: absolute;
            top: 90px;
            z-index: 4; /* Behind torso */
            transition: background-color 0.3s ease;
        }

        /* The Key Attire: Leggings & Crop Top */
        .avatar-leggings {
            width: 70px;
            height: 180px;
            border-radius: 10px;
            position: absolute;
            top: 200px;
            z-index: 6; /* Covers legs and lower torso */
            transition: background-color 0.3s ease;
            background-color: #333; /* Default color for the garment */
        }

        .avatar-crop-top {
            width: 74px;
            height: 50px;
            border-radius: 10px;
            position: absolute;
            top: 90px;
            z-index: 7; /* Covers upper torso */
            transition: background-color 0.3s ease;
             background-color: #333; /* Default color for the garment */
        }

        .action-btn {
            background: var(--gold);
            color: var(--bg-dark);
            border: 2px solid var(--gold);
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: var(--gold-hover);
            box-shadow: 0 0 10px var(--gold);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Creator Control Panel -->
        <div class="control-sidebar">
            <div class="panel-section-title">1. Base Form & Gender</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('base', 'female', this)">Woman</button>
                <button class="option-btn" onclick="setTrait('base', 'male', this)">Man</button>
            </div>

            <div class="panel-section-title">2. Skin Tone</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('skin', '#5c3824', this)">Deep Warm</button>
                <button class="option-btn" onclick="setTrait('skin', '#8d5524', this)">Rich Brown</button>
                <button class="option-btn" onclick="setTrait('skin', '#c68642', this)">Golden Tan</button>
                <button class="option-btn" onclick="setTrait('skin', '#f5d0b1', this)">Fair</button>
            </div>

            <div class="panel-section-title">3. Hairstyle</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('hair', 'Braid-Updo', this)">Braid-Updo</button>
                <button class="option-btn" onclick="setTrait('hair', 'Extensions', this)">Extensions</button>
                <button class="option-btn" onclick="setTrait('hair', 'Natural Curls', this)">Natural Curls</button>
                <button class="option-btn" onclick="setTrait('hair', 'Royal Waves', this)">Royal Waves</button>
            </div>

            <div class="panel-section-title">4. Body Build</div>
            <div class="option-grid">
                <button class="option-btn selected" onclick="setTrait('body', '80px', this)">Regal / Standard</button>
                <button class="option-btn" onclick="setTrait('body', '100px', this)">Athletic Build</button>
            </div>

            <div class="panel-section-title">5. Attire & Robes</div>
            <div class="option-grid" style="grid-template-columns: 1fr;">
                <button class="option-btn selected" onclick="setTrait('outfit', 'Activewear', this)">Leggings & Crop Top</button>
            </div>
        </div>

        <!-- Live Game Creator Stage: FULL BODY -->
        <div class="character-viewport">
            <h2 style="color: var(--gold); position: absolute; top: 15px; margin: 0; font-size: 1.1rem;">Likeness Creation Studio</h2>
            
            <div class="avatar-canvas">
                <div class="character-figure">
                    <!-- The Character Figure Parts -->
                    <div id="avatar-hair" class="avatar-hair-style"></div>
                    <div id="avatar-head" class="avatar-head"></div>
                    <div id="avatar-arms" class="avatar-arms"></div>
                    <div id="avatar-torso" class="avatar-torso"></div>
                    
                    <!-- The Attire Layer (Leggings & Crop Top) -->
                    <div id="avatar-leggings" class="avatar-leggings"></div>
                    <div id="avatar-crop-top" class="avatar-crop-top"></div>
                </div>
            </div>

            <a href="gateway.html" class="action-btn">Save & Enter Realm</a>
        </div>
    </div>

    <script>
        let characterBuild = {
            base: 'female',
            skin: '#5c3824',
            hair: 'Braid-Updo',
            body: '80px',
            outfit: 'Activewear'
        };

        function setTrait(category, value, btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            characterBuild[category] = value;
            updateAvatarDisplay();
        }

        function updateAvatarDisplay() {
            // Apply skin tone to all exposed body parts
            document.getElementById('avatar-head').style.backgroundColor = characterBuild.skin;
            document.getElementById('avatar-arms').style.backgroundColor = characterBuild.skin;
            document.getElementById('avatar-torso').style.backgroundColor = characterBuild.skin;
            
            // Apply body build changes (chest width)
            document.getElementById('avatar-torso').style.width = characterBuild.body;
            document.getElementById('avatar-crop-top').style.width = (parseInt(characterBuild.body) + 10) + 'px';

            // --- Garment Color Logic ---
            // The activewear garment itself doesn't change color, but the skin beneath it shows through.
            // Let's make the leggings and top semi-transparent to let the skin tone influence them,
            // or we can give the garment itself a neutral color. We'll use a dark charcoal gray (like real activewear).
            // The important thing is that the player sees their full character figure.
            
            document.getElementById('avatar-leggings').style.backgroundColor = '#333'; // Dark charcoal
            document.getElementById('avatar-crop-top').style.backgroundColor = '#333'; 
            
            // Adjust hair visual hints based on selection
            const hairElem = document.getElementById('avatar-hair');
            if (characterBuild.hair === 'Braid-Updo') {
                hairElem.style.borderRadius = '35px 35px 15px 15px';
                hairElem.style.height = '40px';
                hairElem.style.width = '66px';
            } else if (characterBuild.hair === 'Extensions') {
                hairElem.style.borderRadius = '35px 35px 25px 25px';
                hairElem.style.height = '60px';
                hairElem.style.width = '64px';
            } else if (characterBuild.hair === 'Natural Curls') {
                hairElem.style.borderRadius = '50%';
                hairElem.style.height = '48px';
                hairElem.style.width = '68px';
            } else {
                hairElem.style.borderRadius = '20px 20px 15px 15px';
                hairElem.style.height = '35px';
                hairElem.style.width = '64px';
            }
        }

        // Initialize display
        updateAvatarDisplay();
    </script>
</body>
</html>
